name: Ease
options:
  bundleIdPrefix: com.easeapp
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "211"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Ease:
    type: application
    platform: iOS
    sources:
      - path: Ease
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.easeapp.ease
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Ease/Info.plist
        CODE_SIGN_ENTITLEMENTS: Ease/Ease.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
    dependencies:
      - target: EaseWidgets
        embed: true
  EaseWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: EaseWidgets
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.easeapp.ease.widgets
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: EaseWidgets/Info.plist
        CODE_SIGN_ENTITLEMENTS: EaseWidgets/EaseWidgets.entitlements
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: "NO"
  EaseTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: EaseTests
      - path: Ease.storekit
    dependencies:
      - target: Ease
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.easeapp.ease.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  EaseUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: EaseUITests
    dependencies:
      - target: Ease
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.easeapp.ease.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Ease:
    build:
      targets:
        Ease: all
        EaseTests: [test]
        EaseUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Ease.storekit
    test:
      config: Debug
      storeKitConfiguration: Ease.storekit
      targets:
        - EaseTests
        - EaseUITests
    archive:
      config: Release
